<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="src/Assents/img/faviconDonnaCoffe.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="src/Style/style.css" />
    <title>Donna Coffe</title>
  </head>
  <body>
    <div id="video-background">
      <video
        src="src/Assents/video/coffe.mp4"
        autoplay
        loop
        muted
        playsinline
      ></video>
      <div class="mascara-bg"></div>
    </div>
    <header>
      <section id="container-all">
        <section class="container-header">
          <figure class="logo">
            <img
              src="src/Assents/img/LogoDonnaCoffee.png"
              alt="Logo Donna Coffe"
            />
          </figure>
          <nav class="links">
            <ul>
              <li><a href="#home">Home</a></li>
              <li><a href="#about">Sobre</a></li>
              <li><a href="#menu">Menu</a></li>
              <li><a href="#gallery">Galeria</a></li>
              <li><a href="#contact">Contato</a></li>
            </ul>
          </nav>

          <div class="icons">
            <a href="#">
              <img
              width="35"
              height="35"
              src="https://img.icons8.com/fluency-systems-filled/FFFFFF/40/search.png"
              alt="search"
            /></a>
            <a href="#">
              <img
              width="35"
              height="35"
              src="https://img.icons8.com/ios-glyphs/FFFFFF/30/shopping-cart--v1.png"
              alt="shopping-cart--v1"
            />
            </a>
          </div>
          <div class="button-menu-links">
            <div class="linha"></div>
            <div class="linha"></div>
            <div class="linha"></div>
          </div>
        </section>
      </section>
    </header>

    <main>
      <section id="container-all">

<!-- HOME -->
        <section id="home">
          <h1>O sabor perfeito do café está aqui<br>Experimente!</h1>
          <img src="src/Assents/img/LogoDonnaCoffee.png" alt="Logo da cafeteria Donna Coffe" />
        </section>

<!-- HISTORIA -->
        <section id="historia">
          <h2>Nosssa Historia</h2>
          <div id="infeite">
            <div class="linhas">
              <span class="linha01"></span>
              <span class="linha02"></span>
            </div>
            <img src="src/Assents/img/grao.svg" alt="icons grão de café">
            <div class="linhas">
              <span class="linha01"></span>
              <span class="linha02"></span>
            </div>
            
          </div>
          
        </section>
      </section>
    </main>

    <footer></footer>

    <script src="index.js"></script>
  </body>
</html>
